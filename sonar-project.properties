sonar.projectKey=chandni-kaithavalappil_Flag_Guesser
sonar.organization=chandni-kaithavalappil

sonar.projectName=Flag Guesser
sonar.projectVersion=1.0.0

# Source and test directories
sonar.sources=src
sonar.tests=tests
sonar.inclusions=src/**/*.js
sonar.test.inclusions=tests/**/*.test.js

# Coverage report (lcov generated by vitest)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclude generated / third-party files from analysis
sonar.exclusions=src/data/countries.json,dist/**,coverage/**,node_modules/**
